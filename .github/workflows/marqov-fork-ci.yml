name: marqov-quantumflow CI

on:
  push:
    branches: ["**"]
    tags: ["v*"]
  pull_request:

jobs:
  test-matrix:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - axis: floor
            numpy: "numpy==1.26.0"
            scipy: "scipy==1.11.2"
          - axis: ceiling
            numpy: "numpy<2.4"
            scipy: "scipy"
    name: test (py3.12, ${{ matrix.axis }})
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # setuptools_scm needs tags/history
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      # MINIMAL install on purpose. We do NOT install ".[dev]" — it pulls heavy
      # optional SDKs (qiskit, cirq, qutip, pyquil, amazon-braket-sdk) whose own
      # numpy/scipy constraints could drag the axis pin off its target or fail
      # resolution, silently defeating the dual-axis test. Pin numpy/scipy FIRST
      # so they are authoritative, add pytest, then install only the fork's core
      # runtime deps. QuantumFlow's integration tests (x*_test.py) each call
      # pytest.importorskip(...) at module top, so without those SDKs they SKIP
      # cleanly — I6 validates the numerical CORE across the numpy/scipy matrix,
      # which is exactly where the scipy-cap compatibility risk lives.
      - name: Pin numpy/scipy to the axis, add pytest
        run: |
          python -m pip install --upgrade pip
          pip install "${{ matrix.numpy }}" "${{ matrix.scipy }}" pytest
      - name: Install the fork's core runtime deps (must NOT move numpy/scipy)
        run: pip install .
      - name: Assert installed numpy/scipy still honor the axis (pin is authoritative)
        run: |
          python - <<'PY'
          import numpy, scipy
          print("numpy", numpy.__version__, "scipy", scipy.__version__)
          PY
      - name: Run QuantumFlow's bundled test suite (integration tests self-skip)
        run: pytest quantumflow -q -rs   # -rs lists skipped tests so the skips are visible, not silent
      - name: Packaging metadata check
        run: ./tools/check_metadata.sh

  # TestPyPI exercises the publish MECHANISM on prerelease (rc) tags, e.g. v1.0.0rc1.
  # This burns an rc version on TestPyPI, never the clean 1.0.0.
  publish-testpypi:
    needs: test-matrix
    if: startsWith(github.ref, 'refs/tags/v') && contains(github.ref, 'rc')
    runs-on: ubuntu-latest
    environment: testpypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build
        run: python -m pip install build && python -m build
      - name: Assert built version matches the tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          test -f "dist/marqov_quantumflow-${TAG}-py3-none-any.whl" \
            || { echo "FAIL: built wheel is not version ${TAG}"; ls dist/; exit 1; }
          echo "version OK: ${TAG}"
      - uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/

  # Real PyPI publishes only on FINAL tags (no 'rc'), and only after tests pass.
  publish-pypi:
    needs: test-matrix
    if: startsWith(github.ref, 'refs/tags/v') && !contains(github.ref, 'rc')
    runs-on: ubuntu-latest
    environment: pypi
    permissions:
      id-token: write
    steps:
      - uses: actions/checkout@v4
        with: { fetch-depth: 0 }
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build
        run: python -m pip install build && python -m build
      - name: Assert built version matches the tag
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          test -f "dist/marqov_quantumflow-${TAG}-py3-none-any.whl" \
            || { echo "FAIL: built wheel is not version ${TAG}"; ls dist/; exit 1; }
          echo "version OK: ${TAG}"
      - uses: pypa/gh-action-pypi-publish@release/v1
